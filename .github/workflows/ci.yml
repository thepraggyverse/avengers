name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  doctor:
    name: Avengers doctor
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doctor
        run: python3 scripts/doctor.py
